services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    environment:
      - PORT=8080
      - AGENT_ADDR=agent:50051
    depends_on:
      - agent

  agent:
    build: ./agent
    env_file:
      - ./agent/.env
    environment:
      - MCP_SERVER_URL=http://mcp-server:8090/sse
    depends_on:
      - mcp-server

  mcp-server:
    build: ./mcp-server
    environment:
      - MCP_SERVER_PORT=8090
